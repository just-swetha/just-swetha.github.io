<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sort It Out — AR Scavenger Hunt</title>
<style>
/* CSS Reset & Core Phone Shell */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', sans-serif;
  background: #1c1c1e;
  display: flex; align-items: center; justify-content: center;
  min-height: 100vh; overflow: hidden;
}

.phone-outer { position:relative; width:340px; height:720px; flex-shrink:0; }
.phone-frame {
  position:absolute; inset:0; background:#000;
  border-radius:50px; border:6px solid #2c2c2e;
  box-shadow:0 40px 80px rgba(0,0,0,.8);
  overflow:hidden;
}
.phone-screen { position:absolute; inset:0; border-radius:44px; overflow:hidden; }

/* Screens */
.screen {
  position:absolute; inset:0;
  opacity:0; pointer-events:none; transition:opacity .3s ease;
}
.screen.active { opacity:1; pointer-events:all; }

/* Splash Styling */
#s-splash { background:#F1E4D2; display:flex; flex-direction:column; padding:60px 30px; }
.btn-begin {
  margin-top:auto; background:#2B1B1F; color:#F1E4D2; border:none;
  border-radius:100px; padding:18px; font-size:16px; font-weight:700; cursor:pointer;
}

/* Game Elements */
#ar-video { position:absolute; inset:0; width:100%; height:100%; object-fit:cover; filter: brightness(0.7); }

.bins-top {
  position:absolute; top:70px; left:0; right:0;
  display:flex; justify-content:center; gap:15px; z-index:10;
}
.bin-target {
  width:120px; height:120px; border-radius:15px; border:2px solid rgba(255,255,255,0.4);
  background: rgba(0,0,0,0.3); overflow:hidden; position:relative;
}
.bin-target img { width:100%; height:100%; object-fit:cover; opacity: 0.8; }
.bin-label { position:absolute; bottom:5px; width:100%; text-align:center; color:#fff; font-size:10px; font-weight:700; text-transform:uppercase; }

.item-zone { position:absolute; inset:0; pointer-events:none; z-index:20; }
.item-card {
  width:120px; height:120px; background:#fff; border-radius:20px;
  position:absolute; top:50%; left:50%; margin-top:-60px; margin-left:-60px;
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  box-shadow: 0 10px 30px rgba(0,0,0,0.3); pointer-events:all; cursor:grab;
}
.item-card img { width:70px; height:70px; object-fit:contain; }
.item-card span { font-size:11px; font-weight:700; margin-top:8px; color:#2B1B1F; }

.ar-hint {
  position:absolute; bottom:60px; width:100%; text-align:center;
  color:#fff; font-weight:600; text-shadow:0 2px 4px rgba(0,0,0,0.5); z-index:30;
}
</style>
</head>
<body>

<div class="phone-outer">
  <div class="phone-frame">
    <div class="phone-screen">

      <div class="screen active" id="s-splash">
        <h1 style="color:#2B1B1F; font-size:32px;">Sort It Out AR</h1>
        <p style="color:rgba(43,27,31,0.6); margin-top:10px;">Find the trash hidden in your room and sort it into the right bins.</p>
        <button class="btn-begin" onclick="initAR()">Start AR Scavenger Hunt</button>
      </div>

      <div class="screen" id="s-game">
        <video id="ar-video" autoplay playsinline muted></video>
        
        <div class="bins-top">
          <div class="bin-target" id="goal-recycle">
            <img src="bin-recycle.jpg"> <div class="bin-label">Recycling</div>
          </div>
          <div class="bin-target" id="goal-trash">
            <img src="bin-trash.jpg"> <div class="bin-label">Trash</div>
          </div>
        </div>

        <div class="item-zone" id="ar-zone"></div>
        <div class="ar-hint" id="hint-text">Move your phone to find trash...</div>
      </div>

    </div>
  </div>
</div>

<script>
const TRASH_ITEMS = [
  { name: 'Plastic Bottle', type: 'recycle', img: 'item-bottle.png', bearing: Math.random() * 360 },
  { name: 'Coffee Cup', type: 'trash', img: 'item-cup.png', bearing: Math.random() * 360 },
  { name: 'Aluminum Can', type: 'recycle', img: 'item-can.png', bearing: Math.random() * 360 }
];

let currentIndex = 0;
let userHeading = 0;
let isDragging = false;

// Initialize AR and Camera
async function initAR() {
  // Request Sensors for iOS
  if (window.DeviceOrientationEvent && typeof DeviceOrientationEvent.requestPermission === 'function') {
    const res = await DeviceOrientationEvent.requestPermission();
    if (res !== 'granted') return alert("Need motion permissions!");
  }

  // Camera access
  const video = document.getElementById('ar-video');
  const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } });
  video.srcObject = stream;

  // Listen for rotation
  window.addEventListener('deviceorientation', (e) => {
    userHeading = e.webkitCompassHeading || (360 - e.alpha);
    if (!isDragging) updateARPosition();
  });

  showScreen('s-game');
  spawnItem();
}

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function spawnItem() {
  if (currentIndex >= TRASH_ITEMS.length) {
    alert("You cleaned the whole room!");
    location.reload();
    return;
  }

  const item = TRASH_ITEMS[currentIndex];
  const zone = document.getElementById('ar-zone');
  
  zone.innerHTML = `
    <div class="item-card" id="current-trash" 
         onmousedown="startDrag(event)" 
         ontouchstart="startDrag(event)">
      <img src="${item.img}">
      <span>${item.name}</span>
    </div>
  `;
}

function updateARPosition() {
  const card = document.getElementById('current-trash');
  if (!card) return;

  const item = TRASH_ITEMS[currentIndex];
  let diff = item.bearing - userHeading;
  
  // Normalize angle
  if (diff > 180) diff -= 360;
  if (diff < -180) diff += 360;

  const hint = document.getElementById('hint-text');

  if (Math.abs(diff) < 40) {
    // Show on screen
    card.style.opacity = "1";
    card.style.pointerEvents = "all";
    const xPos = diff * 4; // Scale movement
    card.style.transform = `translateX(${xPos}px)`;
    hint.innerText = "Target Found! Pick it up!";
  } else {
    // Hide and give direction hint
    card.style.opacity = "0";
    card.style.pointerEvents = "none";
    hint.innerText = diff > 0 ? "Turn Right →" : "← Turn Left";
  }
}

// Drag Logic
let activeCard = null;
function startDrag(e) {
  isDragging = true;
  activeCard = e.currentTarget;
  activeCard.style.transition = 'none';
  
  const moveHandler = (me) => {
    const t = me.touches ? me.touches[0] : me;
    // Follow finger relative to center
    const x = t.clientX - 170;
    const y = t.clientY - 360;
    activeCard.style.transform = `translate(${x}px, ${y}px) scale(1.1)`;
  };

  const endHandler = (ee) => {
    const t = ee.changedTouches ? ee.changedTouches[0] : ee;
    isDragging = false;
    
    // Check if dropped near the top (bins)
    if (t.clientY < 200) {
      const isLeft = t.clientX < 170;
      const binChoice = isLeft ? 'recycle' : 'trash';
      
      if (binChoice === TRASH_ITEMS[currentIndex].type) {
        currentIndex++;
        spawnItem();
      } else {
        // Wrong bin bounce
        activeCard.style.transition = 'transform 0.4s';
        activeCard.style.transform = 'translate(0,0)';
      }
    } else {
      activeCard.style.transform = 'translate(0,0)';
    }

    document.removeEventListener('mousemove', moveHandler);
    document.removeEventListener('mouseup', endHandler);
    document.removeEventListener('touchmove', moveHandler);
    document.removeEventListener('touchend', endHandler);
  };

  document.addEventListener('mousemove', moveHandler);
  document.addEventListener('mouseup', endHandler);
  document.addEventListener('touchmove', moveHandler, {passive:false});
  document.addEventListener('touchend', endHandler);
}
</script>

</body>
</html>
